<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbejdstidsberegner</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arbejdstid">
<meta name="theme-color" content="#0f1117">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --accent:   #4f8cff;
    --accent2:  #a78bfa;
    --text:     #e8eaf2;
    --muted:    #6b7280;
    --success:  #34d399;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 32px;
    line-height: 1.3;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }

  .time-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  input[type="time"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.15s;
    color-scheme: dark;
  }

  input[type="time"]:focus {
    border-color: var(--accent);
  }

  .btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 0 14px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-now {
    color: var(--accent);
    border-color: var(--accent);
  }

  .btn-now:hover {
    background: rgba(79,140,255,0.1);
  }

  .toggles {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .toggle-row:hover {
    border-color: var(--accent);
  }

  .toggle-row.active {
    border-color: var(--accent2);
    background: rgba(167,139,250,0.07);
  }

  .toggle-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .toggle-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .toggle-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .toggle-pill {
    width: 40px;
    height: 22px;
    border-radius: 999px;
    background: var(--border);
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-row.active .toggle-pill {
    background: var(--accent2);
  }

  .toggle-pill::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }

  .toggle-row.active .toggle-pill::after {
    transform: translateX(18px);
  }

  .divider {
    margin: 28px 0;
    border: none;
    border-top: 1px solid var(--border);
  }

  .result-block {
    text-align: center;
  }

  .result-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .result-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    color: var(--success);
    letter-spacing: -0.02em;
    line-height: 1;
    transition: color 0.2s;
  }

  .result-time.empty {
    color: var(--border);
  }

  .result-meta {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
  }

  .result-meta span {
    color: var(--accent2);
  }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Arbejdstid</div>
  <h1>Hvornår kan jeg gå hjem?</h1>

  <label for="start">Mødetid</label>
  <div class="time-row">
    <input type="time" id="start">
    <button class="btn btn-now" onclick="setNow()">Nu</button>
  </div>

  <div class="toggles">
    <div class="toggle-row" id="toggle-til" onclick="toggle('til')">
      <div class="toggle-label">
        <span class="toggle-name">Kørsel til arbejde</span>
        <span class="toggle-sub">+15 min</span>
      </div>
      <div class="toggle-pill"></div>
    </div>
    <div class="toggle-row" id="toggle-fra" onclick="toggle('fra')">
      <div class="toggle-label">
        <span class="toggle-name">Kørsel fra arbejde</span>
        <span class="toggle-sub">+15 min</span>
      </div>
      <div class="toggle-pill"></div>
    </div>
  </div>

  <hr class="divider">

  <div class="result-block">
    <div class="result-label">Gå hjem kl.</div>
    <div class="result-time empty" id="result">--:--</div>
    <div class="result-meta" id="meta"></div>
  </div>
</div>

<script>
  const BASE_MINUTES = 7 * 60 + 24;
  const STORAGE_KEY = 'arbejdstid_state';

  const state = { til: false, fra: false, time: '' };

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        state.til  = !!parsed.til;
        state.fra  = !!parsed.fra;
        state.time = parsed.time || '';
      }
    } catch (e) {}
  }

  function applyState() {
    document.getElementById('start').value = state.time;
    ['til', 'fra'].forEach(key => {
      document.getElementById('toggle-' + key).classList.toggle('active', state[key]);
    });
    calculate();
  }

  function setNow() {
    const now = new Date();
    state.time = pad(now.getHours()) + ':' + pad(now.getMinutes());
    document.getElementById('start').value = state.time;
    saveState();
    calculate();
  }

  function toggle(key) {
    state[key] = !state[key];
    document.getElementById('toggle-' + key).classList.toggle('active', state[key]);
    saveState();
    calculate();
  }

  function calculate() {
    const input = document.getElementById('start').value;
    const resultEl = document.getElementById('result');
    const metaEl   = document.getElementById('meta');

    if (!input) {
      resultEl.textContent = '--:--';
      resultEl.classList.add('empty');
      metaEl.textContent = '';
      return;
    }

    const [h, m] = input.split(':').map(Number);
    const startMinutes = h * 60 + m;
    const extra = (state.til ? 15 : 0) + (state.fra ? 15 : 0);
    const endMinutes = startMinutes + BASE_MINUTES + extra;
    const endH = Math.floor(endMinutes / 60) % 24;
    const endM = endMinutes % 60;

    resultEl.textContent = pad(endH) + ':' + pad(endM);
    resultEl.classList.remove('empty');

    const parts = ['7t 24min'];
    if (extra > 0) parts.push('<span>+' + extra + ' min kørsel</span>');
    metaEl.innerHTML = parts.join(' · ');
  }

  document.getElementById('start').addEventListener('input', function() {
    state.time = this.value;
    saveState();
    calculate();
  });

  loadState();
  applyState();
</script>
</body>
</html>
